name: ci

# Per-PR checks: lint, typecheck, unit + integration tests.
#
# Runs on every PR against `main` and on every push to `main`. The
# nightly eval (`.github/workflows/eval-nightly.yml`) handles the e2e
# tier against real LLM calls — this workflow does not consume
# Anthropic credits.
#
# Design: docs/decisions/0024-pr-ci-lint-mypy-tests.md

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  # Cancel superseded PR runs but never cancel a main run — main
  # completion feeds the nightly eval's baseline.
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          # Install ruff by itself — ruff has no runtime deps, so we
          # skip the full editable install to keep this job fast.
          pip install ruff
      - name: Ruff check
        run: ruff check .

  typecheck:
    name: mypy (strict, src/)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project (with dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Mypy strict
        # Tests use monkeypatching heavily and are not strict-typed
        # yet — a follow-up cleanup PR will bring them under the same
        # gate. Explicit src/ scope prevents accidental regressions
        # from creeping in on src/ while tests catch up.
        run: mypy --strict src/

  tests:
    name: pytest (unit + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project (with dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit + integration tests
        # Excludes the e2e tier explicitly. Currently all tests are
        # effectively unit or integration (mocks + fakeredis, ~5s
        # wall clock); e2e populates as those tests get authored.
        # The marker filter is the durable selection knob.
        run: pytest -m "not e2e" -q

  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Validate compose file
        # `compose config` resolves interpolation + validates schema.
        # A dummy API key satisfies the `${VAR:?...}` gate without
        # leaking a real secret.
        run: ANTHROPIC_API_KEY=dummy docker compose config --quiet
      - name: Build image
        # Cache the layer graph in the runner's local GHA cache — a
        # rebuild without dep changes lands in ~30s vs. ~4min cold.
        # Loaded into the local daemon so subsequent steps could
        # `docker run` against it if we add a smoke-boot step later.
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: arxiv-research-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
