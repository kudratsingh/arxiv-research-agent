name: nightly-eval

# Runs the full benchmark against Claude every night. Uploads the run
# as an artifact, diffs against the previous nightly's summary, and
# fails the workflow if any query regressed beyond the threshold.
#
# Design: docs/decisions/0010-nightly-eval-ci.md

on:
  schedule:
    # 04:00 UTC — outside typical dev hours in both US and EU.
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      queries:
        description: "Comma-separated benchmark query IDs (empty = all)"
        required: false
        default: ""
      threshold:
        description: "Regression threshold on raw scores"
        required: false
        default: "0.10"

concurrency:
  # Never run two nightlies at once; a manual dispatch supersedes a
  # scheduled one.
  group: nightly-eval
  cancel-in-progress: false

permissions:
  # `contents: write` + `pull-requests: write` allow the README
  # update step to open a PR against `main` with the freshly
  # computed eval numbers. See src/eval/readme_update.py + the
  # "Latest eval results" section in README.md.
  contents: write
  actions: read
  pull-requests: write

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Force real arXiv, not mock data — the point of nightly eval.
      USE_MOCK_DATA: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project (with dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Download previous nightly baseline
        id: download-baseline
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          mkdir -p baseline
          # Find the most recent completed run of this workflow on main
          # that produced the eval-summary-latest artifact. Uses the
          # built-in gh CLI so we don't take a third-party-action dep.
          prev_run=$(gh run list \
            --workflow=eval-nightly.yml \
            --branch=main \
            --status=completed \
            --limit=5 \
            --json databaseId,conclusion \
            --jq 'map(select(.conclusion == "success" or .conclusion == "failure")) | .[0].databaseId' \
            2>/dev/null || true)
          if [ -z "$prev_run" ] || [ "$prev_run" = "null" ]; then
            echo "No previous nightly run found — treating this as first-run baseline."
            exit 0
          fi
          echo "Downloading eval-summary-latest from run $prev_run"
          gh run download "$prev_run" \
            --name eval-summary-latest \
            --dir baseline \
            || echo "Baseline artifact missing on run $prev_run — first-run behavior."

      - name: Run eval
        id: run-eval
        run: |
          if [ -n "${{ inputs.queries }}" ]; then
            python -m src.eval.runner --queries "${{ inputs.queries }}"
          else
            python -m src.eval.runner
          fi

      - name: Locate current summary
        id: find-current
        run: |
          latest_dir=$(ls -1dt outputs/eval/*/ 2>/dev/null | head -n1 | sed 's:/$::')
          if [ -z "$latest_dir" ]; then
            echo "No eval output found under outputs/eval/" >&2
            exit 1
          fi
          echo "run_dir=$latest_dir" >> "$GITHUB_OUTPUT"
          echo "summary=$latest_dir/summary.jsonl" >> "$GITHUB_OUTPUT"

      - name: Upload full eval run
        uses: actions/upload-artifact@v4
        with:
          name: eval-run-${{ github.run_id }}
          path: ${{ steps.find-current.outputs.run_dir }}
          retention-days: 90

      - name: Upload latest summary (baseline for next run)
        uses: actions/upload-artifact@v4
        with:
          name: eval-summary-latest
          path: ${{ steps.find-current.outputs.summary }}
          retention-days: 90
          overwrite: true

      - name: Diff against previous baseline
        id: diff
        continue-on-error: true
        run: |
          threshold="${{ inputs.threshold }}"
          threshold="${threshold:-0.10}"
          python -m src.eval.regression_diff \
            baseline/summary.jsonl \
            "${{ steps.find-current.outputs.summary }}" \
            --threshold "$threshold" \
            --output regression-report.md

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-${{ github.run_id }}
          path: regression-report.md
          if-no-files-found: ignore

      - name: Fail if regression detected
        if: steps.diff.outcome == 'failure'
        run: |
          echo "::error::Nightly eval regressed against previous baseline. See regression-report artifact."
          exit 1

      # ---- README update (portfolio polish) -----------------------------
      #
      # Patches the "Latest eval results" block in README.md with the
      # numbers from this run, then opens (or updates) a PR against
      # `main`. Runs regardless of the diff step's outcome — regressed
      # numbers are still real numbers; the diff-fail flag already
      # signals that separately.

      - name: Update README's eval-results block
        id: update-readme
        run: |
          python -m src.eval.readme_update \
            --summary "${{ steps.find-current.outputs.summary }}" \
            --readme README.md \
            --run-id "${{ github.run_id }}"
          # Emit whether the file actually changed so the next step
          # can skip PR creation on a no-op update.
          if git diff --quiet README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with updated README block
        if: steps.update-readme.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          # Fixed branch name so subsequent nightly runs update the
          # same PR instead of piling up.
          branch: nightly/eval-readme-update
          commit-message: |
            Update eval-results block from nightly run

            Run: ${{ github.run_id }}
          title: "Nightly eval: update README results block"
          body: |
            Automated update from `eval-nightly.yml` run `${{ github.run_id }}`.

            The `<!-- eval-nightly:start -->` … `<!-- eval-nightly:end -->` block in `README.md` was patched with the fresh aggregate row from this run's `summary.jsonl`.

            No source changes.
          add-paths: |
            README.md
          delete-branch: true
