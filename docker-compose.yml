# Compose stack for local + CI deployments.
#
#   app        FastAPI + workflow (built from ./Dockerfile).
#   web        Next.js demo UI (Sprint 5 PR 1, ADR 0029). Talks to
#              app over the browser (host-published port), not the
#              compose network — SSE is a client-side stream.
#   redis      RedisJobStore backing store (Sprint 4 PR 3, ADR 0027).
#   postgres   Paper cache + embedding cache (Sprint 4 PR 4, ADR 0028).
#
# Persistence via named volumes so a `docker compose down` preserves
# job records + paper cache across restarts. `docker compose down -v`
# wipes everything.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: arxiv-research-agent:local
    container_name: arxiv-research-agent-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      # Anthropic key must come from the host env — never bake into
      # the image. `docker compose up` errors clearly if it's unset
      # because the workflow refuses to boot without it.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY must be set on the host}
      # Wire the API layer to the Redis + Postgres services below.
      # Names resolve on the compose default network.
      JOB_STORE: redis
      REDIS_URL: redis://redis:6379/0
      POSTGRES_URL: postgresql://arxiv:arxiv@postgres:5432/arxiv
      # Sprint 4 PR 4: shared caches for extracted paper text +
      # MiniLM embeddings, backed by the Postgres service. Setting
      # these to `disk` / `none` reverts to Sprint 1 behavior.
      PAPER_CACHE: postgres
      EMBEDDING_CACHE: postgres
      # ADR 0034: share LangGraph checkpoints across API workers via
      # Postgres. Required for HITL to work under multi-worker
      # uvicorn — the ADR-0013 SqliteSaver is single-writer only.
      # Set to `sqlite` to revert to per-worker checkpoints.
      CHECKPOINT_BACKEND: postgres
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      LOG_LEVEL: INFO
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # Ship the browser-facing API URL into the client bundle at
        # build time. Browser and API run on the same host; API is
        # published on `APP_PORT`. Override for staging/prod deploys.
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:${APP_PORT:-8000}}
    image: arxiv-research-agent-web:local
    container_name: arxiv-research-agent-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: arxiv-research-agent-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    # No host port publish by default — the app talks to it over the
    # compose network only. Uncomment to inspect from `redis-cli`
    # on the host during debugging.
    # ports:
    #   - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: arxiv-research-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: arxiv
      POSTGRES_PASSWORD: arxiv
      POSTGRES_DB: arxiv
    # No host port publish by default (see redis note above).
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # `-U arxiv` matches POSTGRES_USER; without it pg_isready checks
      # the wrong role and reports unhealthy on a live database.
      test: ["CMD-SHELL", "pg_isready -U arxiv -d arxiv"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  redis-data:
  postgres-data:
